<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SolarLive Dashboard</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <h1>
        ⚡ SolarLive AI Dashboard
    </h1>



    <div class="controls">

        <input
            type="text"
            id="city"
            list="cities"
            placeholder="Enter City"
            value="Jaipur"
        >

        <datalist id="cities">

            <option value="Jaipur">
            <option value="Delhi">
            <option value="Mumbai">
            <option value="Pune">
            <option value="Bangalore">
            <option value="Chennai">
            <option value="Hyderabad">
            <option value="Kolkata">
            <option value="Ahmedabad">
            <option value="Surat">

        </datalist>


        <input
            type="number"
            id="panel"
            placeholder="Panel Capacity"
            value="5"
        >


        <button onclick="predict()">
            Estimate
        </button>


        <button onclick="getLocation()">
            Use My Location
        </button>


        <button onclick="toggleTheme()">
            Toggle Theme
        </button>

    </div>



    <div class="cards">

        <div class="card">

            <h3>🌡 Temperature</h3>

            <p id="temp">--</p>

        </div>



        <div class="card">

            <h3>☁ Clouds</h3>

            <p id="clouds">--</p>

        </div>



        <div class="card">

            <h3>☀ Solar Radiation</h3>

            <p id="radiation">--</p>

        </div>



        <div class="card highlight">

            <h3>⚡ Energy Output</h3>

            <p id="energy">--</p>

        </div>



        <div class="card">

            <h3>🔋 Efficiency</h3>

            <p id="efficiency">--</p>

        </div>

    </div>



    <div
        id="alertBox"
        class="alert-box"
    >

        Waiting for analysis...

    </div>



    <div class="graph-grid">


        <div class="graph-box energy-graph">

            <canvas id="energyChart"></canvas>

        </div>



        <div class="graph-box">

            <canvas id="hourlyChart"></canvas>

        </div>



        <div class="graph-box">

            <canvas id="radiationChart"></canvas>

        </div>

    </div>

</div>



<script>

let energyChart;

let hourlyChart;

let radiationChart;



function toggleTheme(){

    document.body.classList.toggle(

        "light-mode"

    );

}



function predict(){

    let city =

        document.getElementById("city").value;


    let panel =

        document.getElementById("panel").value;



    document.getElementById("alertBox")
    .innerText =

    "⏳ Fetching live weather and solar data...";



    fetch('/predict', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            city:city,

            panel:panel

        })

    })

    .then(res => res.json())

    .then(data => {



        document.getElementById("temp")
        .innerText =

        data.temperature + " °C";



        document.getElementById("clouds")
        .innerText =

        data.clouds + " %";



        document.getElementById("radiation")
        .innerText =

        data.radiation + " W/m²";



        document.getElementById("energy")
        .innerText =

        data.energy + " kWh";



        document.getElementById("efficiency")
        .innerText =

        data.efficiency + " %";



        // -------- ALERTS --------


        let message = "";


        if(data.energy < 2){

            message =

            "⚠ Low solar output today. Battery backup recommended.";
        }

        else if(data.clouds > 70){

            message =

            "☁ Heavy cloud cover detected. Output may decrease.";
        }

        else if(data.efficiency < 70){

            message =

            "⚡ Efficiency is lower than optimal conditions.";
        }

        else{

            message =

            "✅ Solar conditions look good today.";
        }



        document.getElementById("alertBox")
        .innerText = message;



        // -------- ENERGY GRAPH --------


        const energyCtx =

        document.getElementById(

            'energyChart'
        );


        if(energyChart)
            energyChart.destroy();



        energyChart = new Chart(

            energyCtx,

            {

                type:'line',

                data:{

                    labels:
                    data.forecast_days,

                    datasets:[{

                        label:
                        '7-Day Energy Forecast',

                        data:
                        data.forecast,

                        borderColor:
                        '#3b82f6',

                        backgroundColor:
                        'rgba(59,130,246,0.2)',

                        fill:true,

                        tension:0.4,

                        borderWidth:4
                    }]
                }
            }
        );



        // -------- HOURLY GRAPH --------


        const hourlyCtx =

        document.getElementById(

            'hourlyChart'
        );


        if(hourlyChart)
            hourlyChart.destroy();



        hourlyChart = new Chart(

            hourlyCtx,

            {

                type:'line',

                data:{

                    labels:[

                        '0',
                        '3',
                        '6',
                        '9',
                        '12',
                        '15',
                        '18',
                        '21'

                    ],

                    datasets:[{

                        label:
                        'Hourly Solar Radiation',

                        data:[

                            data.hourly_radiation[0],

                            data.hourly_radiation[3],

                            data.hourly_radiation[6],

                            data.hourly_radiation[9],

                            data.hourly_radiation[12],

                            data.hourly_radiation[15],

                            data.hourly_radiation[18],

                            data.hourly_radiation[21]

                        ],

                        borderColor:
                        '#22c55e',

                        backgroundColor:
                        'rgba(34,197,94,0.2)',

                        fill:true,

                        tension:0.4,

                        borderWidth:4
                    }]
                }
            }
        );



        // -------- EFFICIENCY GRAPH --------


        const radiationCtx =

        document.getElementById(

            'radiationChart'
        );


        if(radiationChart)
            radiationChart.destroy();



        radiationChart = new Chart(

            radiationCtx,

            {

                type:'line',

                data:{

                    labels:[

                        'Morning',
                        'Noon',
                        'Evening'

                    ],

                    datasets:[{

                        label:
                        'Efficiency Trend',

                        data:[

                            data.efficiency - 10,

                            data.efficiency,

                            data.efficiency - 5

                        ],

                        borderColor:
                        '#eab308',

                        backgroundColor:
                        'rgba(234,179,8,0.2)',

                        fill:true,

                        tension:0.4,

                        borderWidth:4
                    }]
                }
            }
        );

    });

}



function getLocation(){

    navigator.geolocation.getCurrentPosition(

        async function(position){

            let lat =

            position.coords.latitude;


            let lon =

            position.coords.longitude;



            let response = await fetch(

                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`

            );



            let data =

            await response.json();



            let city =

                data.address.city ||

                data.address.town ||

                data.address.village;



            document.getElementById("city").value =

            city;



            predict();
        }
    );
}



window.onload = predict;

</script>

</body>
</html>
